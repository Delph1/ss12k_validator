            * _Info_ - Händelse som ej är ett problem men kan vara bra att veta
            vid felsökning.

            * _Warning_ - Behöver uppmärksammas, eventuellt problem.

            * _Error_ - Problem som kärver någon typ av åtgärd.
          enum:
            - Info
            - Warning
            - Error
        timeOfOccurance:
          type: string
          format: date-time
          description: Tidpunkt för loggad händelse.
      required:
        - message
        - severityLevel
    Meta:
      title: Meta
      type: object
      readOnly: true
      properties:
        created:
          type: string
          format: date-time
          description: >
            Datum och tid för när entiteten skapades (RFC 3339 format tex
            "2015-12-12T10:30:00+01:00").
        modified:
          type: string
          format: date-time
          description: >
            Datum och tid för när entiteten senast uppdaterades (RFC 3339 format
            tex "2015-12-12T10:30:00+01:00"). Tidpunkten avser den senaste
            tidpunkt när något av de attribut som direkt tillhör entiteten har
            ändrats. Attribut som kan tas fram med parametrarna expand eller
            expandReferenceNames räknas **inte** som ett attribut till
            entiteten, och ska således **inte** påverka detta värde.
    ObjectReference:
      title: ObjectReference
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          readOnly: true
          description: >
            Namn för visningsyfte för det refererade objektet. Skall endast
            returneras när query parametern `expandReferenceNames` är satt till
            "true".
    Organisation:
      type: object
      title: Organisation
      properties:
        id:
          type: string
          format: uuid
        meta:
          $ref: "#/components/schemas/Meta"
        displayName:
          type: string
          description: Namn på organisationen
        organisationCode:
          type: string
          description: >-
            En kod för att identifiera organisationselementet inom
            organisationen.
        organisationType:
          $ref: "#/components/schemas/Code_OrganisationType"
        organisationNumber:
          type: string
          description: |
            Identitetsbeteckning för juridiska personer såsom kommun eller bolag
        parentOrganisation:
          allOf:
            - $ref: "#/components/schemas/OrganisationReference"
            - description: >
                Identifierare för en eventellt överliggande organisation. Kan ej
                peka på organisationer av typen _Skolenhet_.
        schoolUnitCode:
          type: string
          description: >
            Skolenhetskod. Identifierare för skolenheten enligt Skolverket.
            Används för de skolformer där skolverket bestämmer en skolenhetskod
            för varje enhet.
        schoolTypes:
          type: array
          uniqueItems: true
          description: Anges endas för organisationselement typen Skolenhet.
          items:
            $ref: "#/components/schemas/Code_SchoolType"
        municipalityCode:
          type: string
          description: >
            Kommunkod. Län och kommunkod för den kommun där skolan är belägen,
            exempelvis 0180 där 01 anger länet och 80 anger kommunen.
        url:
          type: string
          format: uri
          description: >
            Länk till en websida med information om skolan eller
            organisationselementet.
        email:
          type: string
          format: email
          description: |
            Epost-adress till skolan eller organisationselementet.
        phoneNumber:
          type: string
          description: |
            Telefonnummer till en skolan eller organisationselementet.
        contactInfo:
          type: array
          items:
            type: object
            title: ContactInfo
            description: >
              Kontaktuppgifter till skolan eller organisationselementet. Kan
              användas för supportkontakt och andra publika kontaktuppgifter.
            properties:
              infoType:
                type: string
                title: Code_OrganisationContactInfoType
                description: >
                  Typ av kontaktuppgift. Publika uppgifter avser uppgifter som
                  kan visas för allmänheten, såsom adress och telefonnummer till
                  skolan.
                enum:
                  - Support
                  - Publik
              info:
                type: string
                description: >
                  Beskrivning i fritext av kontaktuppgifter till skolan eller
                  organisationsenheten.
        startDate:
          type: string
          format: date
          description: >
            Startdatum för organisationensdelens giltighetstid (RFC 3339-format,
            t.ex. "2016-10-15"). Gäller för alla underliggande element som inte
            har ett mer restrektivt värde. Inkluderande.
        endDate:
          type: string
          format: date
          description: >
            Slutdatum för organisationensdelens giltighetstid (RFC 3339-format,
            t.ex. "2016-10-15"). Gäller för alla underliggande element som inte
            har ett mer restrektivt värde. Inkluderande.
      required:
        - id
        - meta
        - displayName
        - organisationType
      description: En skolhuvudman eller annan slags organisatorisk enhet.
    OrganisationReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: OrganisationReference
          description: Referens till ett organisationselement.
    Person:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: >
            Ett objekt ska ha samma överförings-ID mellan samtliga ingående
            system och således är det ett enda namespace för de gemensamma
            ID:na. Objektidentifikatorn är den nyckel som skall vara persistent
            mellan olika processer (enl figur 1).
        meta:
          $ref: "#/components/schemas/Meta"
        givenName:
          type: string
          description: Förnamn.
        middleName:
          type: string
          description: Mellannamn.
        familyName:
          type: string
          description: Efternamn.
        eduPersonPrincipalNames:
          type: array
          description: >
            De identifierare som ska användas för att identifiera användaren
            i skilda e-tjänster. Identifieraren ska vara en spårbar,
            persistent och globalt unik sträng. Den ska bestå av en lokalt
            unik användaridentifierare, ett ’@’ och en domän. En domän är
            ofta, men inte nödvändigtvis, samma som organisationens
            internet-domännamn. _Exempel: kalko@edu.goteborg.se_
          uniqueItems: true
          items:
            type: string
        externalIdentifiers:
          type: array
          items:
            type: object
            title: externalIdentifier
            properties:
              value:
                type: string
                description: Identifierare för användaren.
              context:
                type: string
                description: >
                  Anger för vilket sammanhang användaridentifieraren ska
                  användas. Beskriv med en URI. Värdet kan överenskommas
                  bilateralt mellan två integrerande parter.
                example: "http://linkoping.se/AD"
              globallyUnique:
                type: boolean
                description: >
                  Anger om identifieraren är så utformad att den kan anses vara
                  globalt unik.
            required:
              - context
              - value
              - globallyUnique
        civicNo:
          type: object
          description: Personnummer.
          properties:
            value:
              type: string
              description: >
                Svenskt personnummer, tilldelat personnummer eller Skatteverkets

                samordningsnummer för personen. **Ska** anges med 12 siffror
                utan

                separatorer. _Exempel: 200112240123_


                Samordningsnummer ska anges med 12 siffror utan separator.

                Födelsedagen adderas med talet 60, det vill säga någon född
                den 24

                i en månad får talet 84 som dag. _Exempel: 200112840123_


                Saknas både personnummer och samordningsnummer så förekommer det
                att

                "tillfälligt personnummer" definieras i elevregistret. Dessa är
                möjliga

                att beskriva i detta fält och i så fall tillåts de två första
                positionerna

                efter datumdelen att vara bokstäver. _Exempel: 20130101TF01_
            nationality:
              type: string
              default: SE
              description: >
                Landskod för det land som personnumret härstammar från, enligt
                ISO 3166-1 alpha-2.
          required:
            - value
        birthDate:
          type: string
          format: date
          description: 'Födelsedatum (RFC 3339-format, t.ex. "2016-10-15")'
        sex:
          title: Code_Sex
          type: string
          enum:
            - Man
            - Kvinna
            - Okänt
          description: Biologiskt kön
        securityMarking:
          type: string
          title: Code_SecurityMarking
          description: |
            Återspeglar värdet från folkbokföringsregistret.
          enum:
            - Ingen
            - Sekretessmarkering
            - Skyddad folkbokföring
        personStatus:
          type: string
          description: >
            Anger ifall en person har en aktiv status eller en annan status,
            såsom utvandrad eller avliden.
          title: Code_PersonStatus
          enum:
            - Aktiv
            - Utvandrad
            - Avliden
          default: Aktiv
        emails:
          type: array
          description: En lista med personens epostadresser
          items:
            type: object
            title: Email
            properties:
              value:
                type: string
                format: email
              type:
                type: string
                title: Code_EmailType
                enum:
                  - Privat
                  - Skola elev
                  - Skola personal
                  - Arbete övrigt
            required:
              - value
        phoneNumbers:
          type: array
          description: En lista med telefonnummer till personen.
          items:
            required:
              - number
            type: object
            title: Phonenumber
            properties:
              value:
                type: string
                description: Telefonnumret.
              type:
                type: string
                title: Code_PhoneNumberType
                enum:
                  - Hem
                  - Arbete
              mobile:
                type: boolean
                default: true
        addresses:
          type: array
          description: En lista med personens postadresser
          items:
            type: object
            properties:
              type:
                type: string
                default: Folkbokföring
                title: Code_AddressType
                enum:
                  - Folkbokföring
                  - Särskildpostadress
                  - Tillfälligadress
                  - Postadress
              streetAddress:
                type: string
                description: Gatuadress.
              locality:
                type: string
                description: Postort.
              postalCode:
                type: string
                description: Postadress.
              countyCode:
                type: integer
                description: "Län, kod"
              municipalityCode:
                type: integer
                description: "Kommun, kod"
              realEstateDesignation:
                type: string
                description: Fastighetsbeteckning
              country:
                type: string
                description: Land.
        photo:
          type: string
          format: uri
          description: >
            Pekar ut en resurs med en bild på personen, specificeras som en URI
            enligt RFC 3986.
        enrolments:
          type: array
          description: En lista med inskrivningar för personen
          items:
            $ref: "#/components/schemas/Enrolment"
        responsibles:
          type: array
          description: >
            Personens vårdnadshavare eller motsvarande relationer så som
            familjehemsförälder. Denna relation beskriver ett officiellt
            ansvarsförhållande.
          items:
            type: object
            properties:
              person:
                $ref: "#/components/schemas/PersonReference"
              relationType:
                $ref: "#/components/schemas/Code_RelationType"
      required:
        - id
        - givenName
        - familyName
    PersonExpanded:
      allOf:
        - $ref: "#/components/schemas/Person"
        - type: object
          properties:
            _embedded:
              type: object
              properties:
                responsibleFor:
                  type: array
                  description: |
                    De barn/barnen vilka personen har ansvar för.
                  items:
                    type: object
                    properties:
                      person:
                        $ref: "#/components/schemas/PersonReference"
                      relationType:
                        $ref: "#/components/schemas/Code_RelationType"
                placements:
                  type: array
                  description: |
                    En lista med placeringar för personen.
                  items:
                    $ref: "#/components/schemas/Placement"
                ownedPlacements:
                  type: array
                  description: |
                    En lista med placeringar där personen är satt som ägare.
                  items:
                    $ref: "#/components/schemas/Placement"
                duties:
                  type: array
                  description: Personens aktuella tjänstgöring
                  items:
                    $ref: "#/components/schemas/Duty"
                groupMemberships:
                  type: array
                  description: |
                    En lista med grupper där personen är medlem i
                  items:
                    type: object
                    properties:
                      group:
                        $ref: "#/components/schemas/GroupFragment"
                      startDate:
                        description: >
                          Startdatum för personens medlemskap i gruppen (RFC
                          3339-format, t.ex. "2016-10-15"). Inkluderande.
                        type: string
                        format: date
                      endDate:
                        description: >
                          Slutdatum för personens medlemskap i gruppen (RFC
                          3339-format, t.ex. "2016-10-15"). Inkluderande.
                        type: string
                        format: date
    PersonReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: PersonReference
          description: Referens till en person
          properties:
            securityMarking:
              type: string
              title: Code_SecurityMarking
              description: |
                Återspeglar värdet från folkbokföringsregistret.
              enum:
                - Ingen
                - Sekretessmarkering
                - Skyddad folkbokföring
    Placement:
      type: object
      title: Placement
      properties:
        id:
          type: string
          format: uuid
        meta:
          $ref: "#/components/schemas/Meta"
        placedAt:
          allOf:
            - $ref: "#/components/schemas/SchoolUnitReference"
            - description: Skolenhet där barnet är placerat.
        group:
          allOf:
            - $ref: "#/components/schemas/GroupReference"
            - description: Barngrupp eller avdelning knutet till denna placering.
        child:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Identifierare av person som placeringen avser.
        owners:
          type: array
          description: >
            En lista med identifierare för de personer som äger placeringen.
            Används primärt för att styra vilka som skall kunna se och lägga
            schema.
          items:
            $ref: "#/components/schemas/PersonReference"
        schoolType:
          type: string
          title: Code_SchoolType
          description: "Skolform för placeringen, förskola eller fritidshem"
          enum:
            - FS
            - FTH
            - OPPFTH
        startDate:
          type: string
          format: date
          description: >
            Startdatum för placeringen (RFC 3339-format, t.ex. "2016-10-15").
            Inkluderande.
        endDate:
          type: string
          format: date
          description: >
            Slutdatum för placeringen (RFC 3339-format, t.ex. "2016-10-15").
            Inkluderande.
        reason:
          type: string
          title: Code_Reason
          description: En kod för att beskriva orsak för placeringen.
          enum:
            - Omsorg
            - Erbjuden tid
            - Eget behov
        maxWeeklyScheduleHours:
          type: integer
          description: Anger maximal schematid per vecka för barnets placering.
      required:
        - id
        - placedAt
        - child
        - startDate
    PlacementExpanded:
      allOf:
        - $ref: "#/components/schemas/Placement"
        - type: object
          properties:
            _embedded:
              type: object
              properties:
                child:
                  $ref: "#/components/schemas/Person"
                owners:
                  type: array
                  items:
                    $ref: "#/components/schemas/Person"
    PlacementReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: PlacementReference
          description: Referens till en placering
    Programme:
      type: object
      description: Ett program av kurser.
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för programmet.
        meta:
          $ref: "#/components/schemas/Meta"
        name:
          type: string
          description: Program-/inriktningens namn.
        type:
          type: string
          title: Code_ProgrammeType
          enum:
            - Yrkesprogram
            - Högskoleförberedande program
            - Intruduktionsprogram
            - Nationellt yrkespaket
            - Regionalt yrkespaket
            - Fjärde tekniskt år
            - Programinriktning
            - Utgång
          description: Typ av program.
        parentProgramme:
          allOf:
            - $ref: "#/components/schemas/ProgrammeReference"
            - description: >
                Referens till det program en programinriktning/utgång tillhör.

                Anges endast för typerna _Programinriktning_ och _Utgång_.

                Program av typen _Utgång_ pekar alltid ett program av typen
                _Programinriktning_.

                Program av typen _Programinriktning_ perkar alltid på ett
                program typen

                _Yrkesprogram_, _Högskoleförberedande program_,
                _Intruduktionsprogram_,

                _Nationellt yrkespaket_, _Regionalt yrkespaket_ eller _Fjärde
                tekniskt år_.

                För övriga programtyper skall värdet inte vara definierat.
        schoolType:
          $ref: "#/components/schemas/Code_SchoolType"
        code:
          type: string
          description: >
            Program-/inriktningskod(studievägskod). För gymnasieskolans
            program/inriktningar måste denna finnas och vara enligt Skolverkets
            definition.
        content:
          type: array
          description: Kurser/ämnen som ingår i utbildningen.
          items:
            type: object
            required:
              - type
              - content
            properties:
              type:
                type: string
                title: Code_ProgrammeContentType
                description: >
                  Anger ingående kursers relation till programmet, såsom
                  Programgemensamma. Typen _Inriktning_ kan endast anges för
                  program av typen _Programinriktning_.
                enum:
                  - Gymnasiegemensamma
                  - Programgemensamma
                  - Inriktning
                  - Programfördjupning
                  - Gymnasiearbete
                  - Individuellt val
              points:
                type: integer
                description: Poäng för innehållstypen i förekommande fall.
              content:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/SyllabusReference"
                    - description: Lista av ingående kursers kursplaner.
      required:
        - name
        - schoolType
    ProgrammeReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - description: Identifierare för program (Programme)
          title: ProgrammeReference
    Resource:
      type: object
      title: Resource
      properties:
        id:
          type: string
          format: uuid
        meta:
          $ref: "#/components/schemas/Meta"
        displayName:
          type: string
          description: Namn på resursen.
        description:
          type: string
          description: Beskrivning av resursen.
        owner:
          $ref: "#/components/schemas/OrganisationReference"
      required:
        - id
        - meta
        - displayName
        - owner
    Room:
      type: object
      title: Room
      description: Ett rum eller en plats som kan bokas i ett skolschema.
      properties:
        id:
          type: string
          format: uuid
        meta:
          $ref: "#/components/schemas/Meta"
        displayName:
          type: string
          description: Namn på rum/lokal/plats.
        seats:
          type: integer
          description: Antal platser i lokalen.
        owner:
          $ref: "#/components/schemas/OrganisationReference"
      required:
        - id
        - meta
        - displayName
        - owner
    SchoolUnitOffering:
      type: object
      title: SchoolUnitOffering
      description: >
        Används för att beskriva vilka program, ämnen och kurser en skolenhet
        erbjuder under ett visst tidsintervall.
      properties:
        startDate:
          type: string
          format: date
          description: >
            Startdatum för när uppsättningen av program/kurser erbjuds vid
            skolan. (RFC 3339-format, t.ex. "2016-10-15"). Inkluderande.
        endDate:
          type: string
          format: date
          description: >
            Slutdatum för när uppsättningen av program/kurser erbjuds vid
            skolan. Ett angivet datum innebär att utbudet inte längre är giltigt
            efter angivet datum. (RFC 3339-format, t.ex. "2016-10-15").
        offeredAt:
          allOf:
            - $ref: "#/components/schemas/SchoolUnitReference"
            - description: Identifierare för skolenheten (SchoolUnit)
        offeredSyllabuses:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/SyllabusReference"
              - description: >
                  Identifierare för kursplaner (Syllabus), innehåller alla
                  ämnen/kurser, även de som också beskrivs genom
                  offeredProgrammes.
        offeredProgrammes:
          type: array
          items:
            $ref: "#/components/schemas/ProgrammeReference"
      required:
        - offeredSyllabuses
        - offeredAt
    SchoolUnitReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: OrganisationReference
          description: Referens till ett organisationselement av typen skolenhet.
    StatisticsEntry:
      type: object
      title: statisticsEntry
      description: Statistik rörande objekt synkronisering.
      properties:
        resourceType:
          $ref: "#/components/schemas/Code_ObjectType"
        newCount:
          type: integer
          description: Antalet nya objekt skapade hos klienten.
        updatedCount:
          type: integer
          description: Antalet uppdaterade objekt hos klienten.
        deletedCount:
          type: integer
          description: Antalet raderade objekt hos klienten.
        resourceUrl:
          type: string
          format: uri
          description: >-
            Eventuell url för relaterad fråga som låg till grund för
            synkroniserade objekt.
        timeOfOccurance:
          type: string
          format: date-time
          description: Tidpunkt för loggad händelse.
      required:
        - resourceType
        - newCount
        - updatedCount
        - deletedCount
    StudyPlan:
      type: object
      title: StudyPlan
      description: En elevs studieplan
      properties:
        id:
          type: string
          format: uuid
        student:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Den elev som studieplanen gäller för.
        meta:
          $ref: "#/components/schemas/Meta"
        content:
          type: array
          items:
            type: object
            title: StudyPlanContent
            properties:
              title:
                type: string
                description: Anger rubriken i elevens studieplan
              type:
                type: string
                title: Code_StudyPlanContentType
                enum:
                  - Gymnasiegemensamma
                  - Programgemensamma
                  - Inriktning
                  - Programfördjupning
                  - Gymnasiearbete
                  - Individuellt val
                  - Borttagna
                  - Utökade
              points:
                type: integer
                description: Anger poängtalet för den aktuella kategorin av kurser
              syllabuses:
                type: array
                items:
                  type: object
                  title: StudyPlanSyllabus
                  properties:
                    syllabus:
                      $ref: "#/components/schemas/SyllabusReference"
                    note:
                      type: string
                      description: Notering angående kursens status i elevens studieplan
                    startDate:
                      type: string
                      format: date
                      description: >
                        Startdatum när eleven läser kursen (RFC 3339-format,
                        t.ex. "2016-10-15"). Inkluderande.
                    endDate:
                      type: string
                      format: date
                      description: >
                        Slutdatum för när eleven läser kursen (RFC 3339-format,
                        t.ex. "2016-10-15"). Inkluderande.
                    hours:
                      type: integer
                      description: >
                        Planlagda timmar för elevens deltagande i kursen. Främst
                        avsedd för studieplaner till vuxenutbildning.
                  required:
                    - syllabus
            required:
              - syllabuses
        notes:
          type: array
          items:
            type: object
            title: StudyPlanNotes
            properties:
              type:
                type: string
                title: Code_StudyPlanNoteType
                enum:
                  - Anteckningar
                  - >-
                    Andra insatser som är gynnsamma för elevens
                    kunskapsutveckling
                  - Elevens tidigare arbetslivserfarenhet och studier
                  - Validering av kunskaper och kompetenser
                  - Elevens mål med studierna
              note:
                type: string
        startDate:
          type: string
          format: date
          description: >
            Startdatum för studieplanen (RFC 3339-format, t.ex. "2016-10-15").
            Inkluderande.
        endDate:
          type: string
          format: date
          description: >
            Slutdatum för studieplanen  (RFC 3339-format, t.ex. "2016-10-15").
            Inkluderande.
      required:
        - id
        - student
        - startDate
    Subscription:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
            expires:
              type: string
              format: date-time
          required:
            - id
            - expires
        - $ref: "#/components/schemas/CreateSubscription"
    Syllabus:
      description: >
        Används för att referera till en specifik kurskod eller ett ämne med
        information om årskurs och skolform som avses med undervisningen. För
        officiella ämnen/kurser anges läroplan.
      type: object
      title: Syllabus
      properties:
        id:
          type: string
          format: uuid
        meta:
          $ref: "#/components/schemas/Meta"
        schoolType:
          $ref: "#/components/schemas/Code_SchoolType"
        subjectCode:
          type: string
          description: >
            En kod för ämnet som används bland annat i lärarlegitimation och i
            Skolverkets kurs- och läroplaner, till exempel GRGRMAT01. Notera att
            detta värde *ej* är den kortare ämndesbeteckningen, exempelvis _MA_,
            utan indikerar inte bara ämne utan även vilken läroplan som avses,
            såsom i exemplet ovan Grundskolan. För ämnen som inte definieras av
            Skolverket används valfri kod.
        subjectName:
          type: string
          description: "Ämnets namn, exempelvis Matematik."
        subjectDesignation:
          type: string
          description: "Ämnets beteckning, exempelvis MA, MLARA."
        courseCode:
          type: string
          description: >
            Kurskod enligt Skolverket, om det är en officiell kurs, eller annars
            efter eget val.
        courseName:
          type: string
          description: "Kursens namn, exempelvis Matematik 1a."
        startSchoolYear:
          type: integer
          description: Start för årskursintervall för undervisningens innehåll.
          maximum: 10
          minimum: 0
        endSchoolYear:
          type: integer
          description: Slut för årskursintervall för undervisningens innehåll.
          maximum: 10
          minimum: 0
        points:
          type: integer
          description: Antalet poäng för en specifik kurs. Exempelvis 100 poäng.
        curriculum:
          $ref: "#/components/schemas/Code_Curriculum"
        languageCode:
          type: string
          description: Språkkod för moderna språk och modersmål. Enligt ISO 639-3.
        specialisationCourseContent:
          type: object
          title: SpecialisationCourseContent
          description: Beskrivning av innehållet i en specialiseringskurs på gymnasiet.
          properties:
            title:
              type: string
              description: Titel på specialiseringskurs.
            description:
              type: string
              description: Beskrivning av specialiseringskurs.
            titleEngish:
              type: string
              description: Eventuell engelsk titel på specialiseringskurs.
            descriptionEnglish:
              type: string
              description: Eventuell engelsk beskrivning av specialiseringskurs.
          required:
            - title
            - description
        official:
          type: boolean
          description: >
            Attributet anger om ämnet är ett officiellt ämne från Skolverket
            eller annan myndighet. Icke officiella ämnen kan skapas för andra
            ändamål än undervisning.
      required:
        - id
        - schoolType
        - subjectCode
        - subjectName
        - official
    SyllabusReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: SyllabusReference
          description: Referens till en Syllabus
  responses:
    204_removed:
      description: Post borttagen.
    400_invalid_filter:
      description: >-
        Filter (ex `sortkey`, `meta.modified.after`, `meta.modified.before`,
        `meta.created.after`, `meta.created.before` etc.) kan inte kombineras
        med `pageToken`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    400_invalid_id:
      description: Felaktigt id.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    403_not_authorised:
      description: Åtkomst nekad.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    404_not_found:
      description: Posten hittades inte.
    503_overload:
      description: Svaret är förstort för servern att hantera.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    default_error:
      description: Okänt fel.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  parameters:
    ActivitiesExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - groups
            - teachers
            - syllabus
    AttendanceEventsExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas för aktiviteten.
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - person
            - group
            - registeredBy
    CalendarEventsExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas för aktiviteten.
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - activity
            - attendance
    DutiesExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - person
    ExpandReferenceNames:
      name: expandReferenceNames
      description: Returnera `displayName` för alla refererade objekt.
      in: query
      schema:
        type: boolean
    GroupsExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - assignmentRoles
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
      required: false
      description: >
        Antal poster som ska visas i resultatet. Utelämnas det så returnas så
        många poster som möjligt av servern, se `pageToken`.
    PageToken:
      in: query
      name: pageToken
      schema:
        type: string
      description: >
        Ett opakt värde som servern givit som svar på en tidigare ställd fråga.
        Kan inte komibineras med andra filter men väl med `limit`.
    PersonsExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - duties
            - responsibleFor
            - placements
            - ownedPlacements
            - groupMemberships
    PlacementsExpandParameter:
      name: expand
      description: Beskriver om expanderade data ska hämtas
      in: query
      schema:
        type: array
        items:
          type: string
          enum:
            - child
            - owners
    SearchCreatedAfter:
      name: meta.created.after
      description: >
        Endast poster skapade efter detta timestamp (RFC 3339 format, tex
        "2015-12-12T10:30:00+01:00"). Exkluderande.
      in: query
      schema:
        type: string
        format: date-time
    SearchCreatedBefore:
      name: meta.created.before
      description: >
        Endast poster skapade på eller före detta timestamp (RFC 3339 format,
        tex "2015-12-12T10:30:00+01:00"). Inkluderande.
      in: query
      schema:
        type: string
        format: date-time
    SearchModifiedAfter:
      name: meta.modified.after
      description: >
        Endast poster modifierade efter detta timestamp (RFC 3339 format, tex
        "2015-12-12T10:30:00+01:00"). Exkluderande.
      in: query
      schema:
        type: string
        format: date-time
    SearchModifiedBefore:
      name: meta.modified.before
      description: >
        Endast poster modifierade på eller före detta timestamp (RFC 3339
        format, tex "2015-12-12T10:30:00+01:00"). Inkluderande.
      in: query
      schema:
        type: string
        format: date-time
    Sortkey:
      in: query
      name: sortkey
      schema:
        type: string
        enum:
          - ModifiedDesc
          - DisplayNameAsc
security:
  - BearerAuth: []
