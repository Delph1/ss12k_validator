          $ref: "#/components/responses/404_not_found"
        default:
          $ref: "#/components/responses/default_error"
  /subscriptions:
    get:
      tags:
        - Prenumeration
      summary: Hämta en lista av prenumerationer.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Subscription"
                  pageToken:
                    type: string
                    nullable: true
                    description: >
                      Om värdet är null finns inget mer att hämta på det token
                      som skickades in som query parameter.
                required:
                  - data
        "403":
          $ref: "#/components/responses/403_not_authorised"
        default:
          $ref: "#/components/responses/default_error"
    post:
      tags:
        - Prenumeration
      summary: Skapa en prenumeration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscription"
            example:
              name: Nya
              target: "https://pastebin/788"
              resourceTypes:
                - Organsation
                - Person
                - Duty
      callbacks:
        subscriptionEvent:
          "{$request.body#/target}":
            post:
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        modifiedEntites:
                          type: array
                          items:
                            $ref: "#/components/schemas/Code_ObjectType"
                          description: >
                            En lista med datatyper där det finns uppdaterad
                            eller ny information att hämta på respektive
                            ändpunkt.
                        deletedEntities:
                          type: boolean
                          description: >
                            True indikerar att det finns information om
                            borttagna entiteter att hämta från ändpunkten
                            `deletedEntitites`.
              responses:
                "200":
                  description: Kod som returneras när anropet accepteras.
      responses:
        "201":
          description: Prenumeration skapad.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        default:
          $ref: "#/components/responses/default_error"
  "/subscriptions/{id}":
