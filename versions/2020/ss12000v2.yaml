openapi: 3.0.2
servers:
  - description: SS12000
    url: "http://some.server.se/v2.0"
info:
  description: >
    Detta är en implementationsspecifikation av SS12000:2020
    [TK450](https://www.sis.se/standardutveckling/tksidor/tk400499/sistk450/)
  version: 2.0.0
  title: SS12000
  termsOfService: "https://www.sis.se/standardutveckling/tksidor/tk400499/sistk450/"
  contact:
    email: tk450@sis.se
tags:
  - name: Organisation
    description: Skolans organisation och grundläggande administration.
  - name: Person
    description: Hanterar personer och personers relationer.
  - name: Grupper
    description: Grupper.
  - name: Studieinformation
    description: "Information om kurser, ämnen, program och studieplaner."
  - name: Aktiviteter
    description: Aktiviteter knyter ihop lärare och elever med ämne eller kurs.
  - name: Kalenderhändelser
    description: Kalenderposter kopplat till aktiviteter
  - name: Rum och resurser
    description: Salar och resurser som kan schemaläggas.
  - name: Närvaro
    description: Information runt en elevs närvaro.
  - name: Vistelseschema
    description: Schema för omsorgstider på förskola eller fritidshem.
  - name: Närvarohändelser
    description: >
      In- och utpassering. Används för närvarohantering i förskola och
      fritidshem (utan kopplingar till kalenderhändelser).
  - name: Borttag
    description: Metod för att följa borttag av entititer.
  - name: Prenumeration
    description: Webhook för att prenumerera på uppdateringar.
  - name: Loggning
    description: Ändpunkter för återrapportering av statistik och händelser.
paths:
  /organisations:
    get:
      tags:
        - Organisation
      summary: Hämta en lista med organisationer.
      parameters:
        - name: parent
          description: "Begränsa urvalet till utpekade organisations-ID:n."
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
        - name: schoolUnitCode
          description: >
            Begränsa urvalet till de skolenheter som har den angivna
            Skolenhetskoden. En Identifierare för skolenheten enligt Skolverket.
          in: query
          schema:
            type: array
            items:
              type: string
        - name: organisationCode
          description: >
            Begränsa urvalet till de organisationselement som har den angivna
            koden.
          in: query
          schema:
            type: array
            items:
              type: string
        - name: municipalityCode
          description: >
            Begränsa urvalet till de organisationselement som har angiven
            kommunkod.
          in: query
          schema:
            type: string
        - name: type
          description: Begränsa urvalet till utpekade typ.
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Code_OrganisationType"
        - name: schoolTypes
          description: >
            Begränsa urvalet till de organisationselement som har den angivna
            skolformen.
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Code_SchoolType"
        - name: startDate.onOrBefore
          description: >
            Begränsa urvalet till organisationselement som har ett startDate
            värde innan eller på det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.
          in: query
          schema:
            type: string
            format: date
        - name: startDate.onOrAfter
          description: >
            Begränsa urvalet till organisationselement som har ett startDate
            värde på eller efter det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.
          in: query
          schema:
            type: string
            format: date
        - name: endDate.onOrBefore
          description: >
            Begränsa urvalet till organisationselement som har ett endDate värde
            innan eller på det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.
          in: query
          schema:
            type: string
            format: date
        - name: endDate.onOrAfter
          description: >
            Begränsa urvalet till organisationselement som har ett endDate värde
            på eller efter det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.
          in: query
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/SearchCreatedBefore"
        - $ref: "#/components/parameters/SearchCreatedAfter"
        - $ref: "#/components/parameters/SearchModifiedBefore"
        - $ref: "#/components/parameters/SearchModifiedAfter"
        - $ref: "#/components/parameters/ExpandReferenceNames"
        - $ref: "#/components/parameters/Sortkey"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organisation"
                  pageToken:
                    type: string
                    nullable: true
                    description: >
                      Om värdet är null finns inget mer att hämta på det token
                      som skickades in som query parameter.
                required:
                  - data
        "400":
          $ref: "#/components/responses/400_invalid_filter"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        default:
          $ref: "#/components/responses/default_error"
  /organisations/lookup:
    post:
      tags:
        - Organisation
      summary: "Hämta många organisationer baserat på en lista av ID:n."
      description: >
        Istället för att hämta organisationer en i taget med en loop av
        GET-anrop så finns det även möjlighet att hämta många organisationer på
        en gång genom att skicka ett anrop med en lista med önskade
        organisationer.
      parameters:
        - $ref: "#/components/parameters/ExpandReferenceNames"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organisation"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        "503":
          $ref: "#/components/responses/503_overload"
        default:
          $ref: "#/components/responses/default_error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                schoolUnitCodes:
                  type: array
                  items:
                    type: string
                organisationCodes:
                  type: array
                  items:
                    type: string
              example:
                ids:
                  - d544563a-747a-42d3-8d37-415a101537fa
                schoolUnitCodes:
                  - "55512387"
                organisationCodes:
                  - F2311
        required: true
  "/organisations/{id}":
    get:
      tags:
        - Organisation
      summary: Hämta en organisation baserat på ID
      parameters:
        - name: id
          in: path
          description: ID för organisationen som ska hämtas
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/ExpandReferenceNames"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisation"
        "400":
          $ref: "#/components/responses/400_invalid_id"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        "404":
          $ref: "#/components/responses/404_not_found"
        default:
          $ref: "#/components/responses/default_error"
  /persons:
    get:
      tags:
        - Person
      summary: Hämta en lista med personer.
      parameters:
        - name: nameContains
          description: >
            Begränsa urvalet till de personer vars namn innehåller något av
            parameterns värden.

            Sökningen **ska** ske shiftlägesokänsligt och värdet kan förekomma
            var som helst i något av alla tre namnfälten. 

            Anges flera värden så måste samtliga värden matcha minst ett av
            namnfälten.


            Exempel: [ "Pa", "gens" ] kommer matcha Palle Girgensohn.
          in: query
          schema:
            type: array
            items:
              type: string
        - name: civicNo
          description: >-
            Begränsa urvalet till den person vars civicNo matchar parameterns
            värde.
          in: query
          schema:
            type: string
        - name: eduPersonPrincipalName
          description: >-
            Begränsa urvalet till den person vars eduPersonPrincipalNames
            matchar parameterns värde.
          in: query
          schema:
            type: string
        - name: identifier.value
          description: >-
            Begränsa urvalet till den person vilka har ett värde i
            `externalIdentifiers.value` som matchar parameterns värde. Kan
            kombineras med parametern `identifier.context` för att begränsa
            matchningen till en specifik typ av indentifierare.
          in: query
          schema:
            type: string
        - name: identifier.context
          description: >-
            Begränsa urvalet till den person vilka har ett värde i
            `externalIdentifiers.context` som matchar parameterns värde.
            Kombineras vanligtvis med `identifier.value` parametern.
          in: query
          schema:
            type: string
        - name: relationship.entity.type
          description: >
            Begränsa urvalet till de personer som har en denna typ av relation
            till andra entititeter. 

            Denna parameter styr vilket entitetstyp som övriga
            relationship-parametrar filterar på.

            Anges inga andra parametrar så returneras personer som har en
            relation av denna typ.


            Möjliga relationer:

            - _enrolment_ - filtrerar utifrån elever inskrivning.

            - _duty_ - filtrerar utifrån personer som har minst en tjänstgöring.

            - _placement.child_ - filtrerar utifrån barn som har minst en
            placering.

            - _placement.owner_ - filtrerar utifrån personer som satta som ägare
            av minst en placering.

            - _responsibleFor.enrolment_ - filterar utifrån personer som har en
            _"responsibleFor"_-relation, dvs är en vårdnadshavare eller annan
            ansvarig vuxen, till en elev med minst en inskrivning.

            - _responsibleFor.placement_ - filterar utifrån personer som har en
            _"responsibleFor"_-relation, dvs är en vårdnadshavare eller annan
            ansvarig vuxen, till ett barn med minst en placering.
              Notera att oftast är det bättre att använda _placement.owner_ än denna parameter.

            Detta kan kombineras med `relationship.startDate.onOrBefore` och
            `relationship.endDate.onOrAfter` för att begränsa till aktiva
            relationer.
          in: query
          schema:
            type: string
            enum:
              - enrolment
              - duty
              - placement.child
              - placement.owner
              - responsibleFor.enrolment
              - responsibleFor.placement
        - name: relationship.organisation
          description: >
            Begränsa urvalet till de personer som har en relation till angivet
            organisationselement (vanligtvis en skolenhet). 

            För att begränsa till en viss relationtyp används parametern
            `relationship.entity.type`.


            Följande fält/relationer används vid filtreringen:

            - _enrolment_ - poster matchandes `person.enrolment.enroledAt`

            - _duty_ - person poster matchandes `duty.person` i en lista
            filtrerad utifrån `duty.dutyAt`.

            - _placement.child_ - person poster matchandes `placement.child` i
            en lista filtrerad utifrån `placement.placedAt`.

            - _placement.owner_ - person poster matchandes `placement.owner` i
            en lista filtrerad utifrån `placement.placedAt`.

            - _responsibleFor.enrolment_ - person poster matchandes
            `person.responsibles` i en lista filtrerad utifrån
            `person.enrolment.enroledAt`.

            - _responsibleFor.placement_ - person poster matchandes
            `person.responsibles` i en lista med person poster som i sin tur
            matchar `placement.child` i en lista filtrerad utifrån
            `placement.placedAt`.
          in: query
          schema:
            type: string
            format: uuid
        - name: relationship.startDate.onOrBefore
          description: >
            Begränsa urvalet av personer till de som har relationer med
            startDate innan eller på det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett startDate som ej är satt, tas alltid med. 

            För att begränsa till en viss relationtyp används parametern
            `relationship.entity.type`.


            Följande fält/relationer används vid filtreringen:

            - _enrolment_ - poster matchandes `person.enrolment.startDate`

            - _duty_ - person poster matchandes `duty.person` i en lista
            filtrerad utifrån `duty.startDate`.

            - _placement.child_ - person poster matchandes `placement.child` i
            en lista filtrerad utifrån `placement.startDate`.

            - _placement.owner_ - person poster matchandes `placement.owner` i
            en lista filtrerad utifrån `placement.startDate`.

            - _responsibleFor.enrolment_ - person poster matchandes
            `person.responsibles` i en lista filtrerad utifrån
            `person.enrolment.startDate`.

            - _responsibleFor.placement_ - person poster matchandes
            `person.responsibles` i en lista med person poster som i sin tur
            matchar `placement.child` i en lista filtrerad utifrån
            `placement.startDate`.
              
            Detta kan kombineras med _relationship.endDate.onOrAfter_ för att
            begränsa till aktiva relationer.
          in: query
          schema:
            type: string
            format: date
        - name: relationship.startDate.onOrAfter
          description: >
            Begränsa urvalet av personer till de som har relationer med
            startDate efter eller på det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett startDate som ej är satt, tas alltid med. 

            För att begränsa till en viss relationtyp används parametern
            `relationship.entity.type`.


            Följande fält/relationer används vid filtreringen:

            - _enrolment_ - poster matchandes `person.enrolment.startDate`

            - _duty_ - person poster matchandes `duty.person` i en lista
            filtrerad utifrån `duty.startDate`.

            - _placement.child_ - person poster matchandes `placement.child` i
            en lista filtrerad utifrån `placement.startDate`.

            - _placement.owner_ - person poster matchandes `placement.owner` i
            en lista filtrerad utifrån `placement.startDate`.

            - _responsibleFor.enrolment_ - person poster matchandes
            `person.responsibles` i en lista filtrerad utifrån
            `person.enrolment.startDate`.

            - _responsibleFor.placement_ - person poster matchandes
            `person.responsibles` i en lista med person poster som i sin tur
            matchar `placement.child` i en lista filtrerad utifrån
            `placement.startDate`.
          in: query
          schema:
            type: string
            format: date
        - name: relationship.endDate.onOrBefore
          description: >
            Begränsa urvalet av personer till de som har relationer med endDate
            innan eller på det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.

            För att begränsa till en viss relationtyp används parametern
            `relationship.entity.type`.


            Följande fält/relationer används vid filtreringen:

            - _enrolment_ - poster matchandes `person.enrolment.endDate`

            - _duty_ - person poster matchandes `duty.person` i en lista
            filtrerad utifrån `duty.endDate`.

            - _placement.child_ - person poster matchandes `placement.child` i
            en lista filtrerad utifrån `placement.endDate`.

            - _placement.owner_ - person poster matchandes `placement.owner` i
            en lista filtrerad utifrån `placement.endDate`.

            - _responsibleFor.enrolment_ - person poster matchandes
            `person.responsibles` i en lista filtrerad utifrån
            `person.enrolment.endDate`.

            - _responsibleFor.placement_ - person poster matchandes
            `person.responsibles` i en lista med person poster som i sin tur
            matchar `placement.child` i en lista filtrerad utifrån
            `placement.endDate`.
          in: query
          schema:
            type: string
            format: date
        - name: relationship.endDate.onOrAfter
          description: >
            Begränsa urvalet av personer till de som har relationer med endDate
            efter eller på det angivna datumet (RFC 3339-format,t.ex.
            "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.

            För att begränsa till en viss relationtyp används parametern
            `relationship.entity.type`.


            Flöjande fält/relationer används vid filtreringen:
             - _enrolment_ - poster matchandes `person.enrolment.endDate`
             - _duty_ - person poster matchandes `duty.person` i en lista filtrerad utifrån `duty.endDate`.
             - _placement.child_ - person poster matchandes `placement.child` i en lista filtrerad utifrån `placement.endDate`.
             - _placement.owner_ - person poster matchandes `placement.owner` i en lista filtrerad utifrån `placement.endDate`.
             - _responsibleFor.enrolment_ - person poster matchandes `person.responsibles` i en lista filtrerad utifrån `person.enrolment.endDate`.
             - _responsibleFor.placement_ - person poster matchandes `person.responsibles` i en lista med person poster som i sin tur matchar `placement.child` i en lista filtrerad utifrån `placement.endDate`.

            Detta kan kombineras med _relationship.startDate.onOrBefore_ för att
            begränsa till aktiva relationer.
          in: query
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/SearchCreatedBefore"
        - $ref: "#/components/parameters/SearchCreatedAfter"
        - $ref: "#/components/parameters/SearchModifiedBefore"
        - $ref: "#/components/parameters/SearchModifiedAfter"
        - $ref: "#/components/parameters/PersonsExpandParameter"
        - $ref: "#/components/parameters/ExpandReferenceNames"
        - name: sortkey
          description: Anger hur resultatet ska sorteras.
          in: query
          schema:
            type: string
            enum:
              - DisplayNameAsc
              - GivenNameDesc
              - GivenNameAsc
              - FamilyNameDesc
              - FamilyNameAsc
              - CivicNoAsc
              - CivicNoDesc
              - ModifiedDesc
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/PageToken"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PersonExpanded"
                  pageToken:
                    type: string
                    nullable: true
                    description: >
                      Om värdet är null finns inget mer att hämta på det token
                      som skickades in som query parameter.
                required:
                  - data
        "400":
          $ref: "#/components/responses/400_invalid_filter"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        default:
          $ref: "#/components/responses/default_error"
  /persons/lookup:
    post:
      tags:
        - Person
      summary: "Hämta många personer baserat på en lista av ID:n eller personnummer."
      description: >
        Istället för att hämta personer en i taget med en loop av GET-anrop så
        finns det även möjlighet att hämta många personer på en gång genom att
        skicka ett anrop med en lista med önskade personer.
      parameters:
        - $ref: "#/components/parameters/PersonsExpandParameter"
        - $ref: "#/components/parameters/ExpandReferenceNames"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonExpanded"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        "503":
          $ref: "#/components/responses/503_overload"
        default:
          $ref: "#/components/responses/default_error"
      requestBody:
        description: |
          En lista med personnummer och / eller uuid:n på personer.
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                civicNos:
                  type: array
                  items:
                    description: >
                      Personnummer, samordningsnummer eller tillfälliga
                      personnummer, och motsvarande för andra länder. För
                      svenska personnummner **ska** formatet 12 tecken utan
                      divis användas. Se exempel.
                    type: string
              example:
                ids:
                  - d544563a-747a-42d3-8d37-415a101537fa
                civicNos:
                  - "201002037271"
        required: true
  "/persons/{id}":
    get:
      tags:
        - Person
      summary: Get person by person id
      parameters:
        - name: id
          in: path
          description: ID för personen som ska hämtas
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/PersonsExpandParameter"
        - $ref: "#/components/parameters/ExpandReferenceNames"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonExpanded"
        "400":
          $ref: "#/components/responses/400_invalid_id"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        "404":
          $ref: "#/components/responses/404_not_found"
        default:
          $ref: "#/components/responses/default_error"
  /placements:
    get:
      tags:
        - Person
      summary: Hämta en lista med placeringar.
      parameters:
        - name: organisation
          description: >
            Begränsa urvalet till de barn som har en placering (placedAt) på
            angivet organisationselement.  Detta kan kombineras med
            startDate.onOrBefore och endDate.onOrAfter för att begränsa till
            aktiva placeringar.
          in: query
          schema:
            type: string
            format: uuid
        - name: group
          description: >
            Begränsa urvalet till de barn som har en placering på angiven grupp.
            Detta kan kombineras med startDate.onOrBefore och endDate.onOrAfter
            för att begränsa till aktiva placeringar.
          in: query
          schema:
            type: string
            format: uuid
        - name: startDate.onOrBefore
          description: >
            Begränsa urvalet till placeringar som har ett startDate värde innan
            eller på det angivna datumet (RFC 3339-format, t.ex. "2016-10-15").
          in: query
          schema:
            type: string
            format: date
        - name: startDate.onOrAfter
          description: >
            Begränsa urvalet till placeringar som har ett startDate värde på
            eller efter det angivna datumet (RFC 3339-format, t.ex.
            "2016-10-15").
          in: query
          schema:
            type: string
            format: date
        - name: endDate.onOrBefore
          description: >
            Begränsa urvalet till placeringar som har ett endDate värde innan
            eller på det angivna datumet (RFC 3339-format, t.ex. "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.
          in: query
          schema:
            type: string
            format: date
        - name: endDate.onOrAfter
          description: >
            Begränsa urvalet till placeringar som har ett endDate värde på eller
            efter det angivna datumet (RFC 3339-format, t.ex. "2016-10-15"). 

            Poster med ett endDate som ej är satt, tas alltid med.
          in: query
          schema:
            type: string
            format: date
        - name: child
          description: >
            Begränsa urvalet till ett barn. Detta kan kombineras med
            startDate.onOrBefore och endDate.onOrAfter för att begränsa till
            aktiva placeringar.
          in: query
          schema:
            type: string
            format: uuid
        - name: owner
          description: >
            Begränsa urvalet till placeringar med denna ägare. Detta kan
            kombineras med startDate.onOrAfter och endDate.onOrBefore för att
            begränsa till aktiva placeringar.
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/SearchCreatedBefore"
        - $ref: "#/components/parameters/SearchCreatedAfter"
        - $ref: "#/components/parameters/SearchModifiedBefore"
        - $ref: "#/components/parameters/SearchModifiedAfter"
