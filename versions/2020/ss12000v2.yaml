      summary: "Hämta många salar baserat på en lista av ID:n."
      description: >
        Istället för att hämta salar en i taget med en loop av GET-anrop så
        finns det även möjlighet att hämta många salar på en gång genom att
        skicka ett anrop med en lista med önskade salar.
      parameters:
        - $ref: "#/components/parameters/ExpandReferenceNames"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
        "403":
          $ref: "#/components/responses/403_not_authorised"
        "503":
          $ref: "#/components/responses/503_overload"
        default:
          $ref: "#/components/responses/default_error"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdLookup"
        required: true
  "/rooms/{id}":
    get:
      tags:
        - Rum och resurser
      summary: Hämta en sal baserat på ID
      parameters:
        - name: id
          in: path
          description: ID för salen som ska hämtas
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/ExpandReferenceNames"
      responses:
        "200":
          description: Anropet lyckades.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
