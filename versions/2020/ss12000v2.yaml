    Code_SchoolType:
      title: Code_SchoolType
      description: |
        Följande värden används för att beskriva skolform:
          - _FS_ - Förskola 
          - _FKLASS_ - Förskoleklass 
          - _FTH_ - Fritidshem
          - _OPPFTH_ - Öppen fritidsverksamhet 
          - _GR_ - Grundskola 
          - _GRS_ - Grundsärskola 
          - _SP_ - Specialskola 
          - _SAM_ - Sameskola 
          - _GY_ - Gymnasieskola 
          - _GYS_ - Gymnasiesärskola 
          - _KOMVUX_ - Kommunal vuxenutbildning på grundläggande och gymnasial nivå 
          - _SARVUX_ - Särskild utbildning för vuxna 
          - _SFI_ - Kommunal vuxenutbildning i svenska för invandrare 
          - _KU_ - Kulturskola 
          - _YH_ - Yrkeshögskola 
          - _FHS_ - Folkhögskola 
          - _STF_ - Studieförbund 
          - _KKU_ - Konst- och kulturutbildning 
          - _HS_ - Högskola 
          - _ABU_ - Arbetsmarknadsutbildning 
          - _AU_ - Annan undervisning
      type: string
      enum:
        - FS
        - FKLASS
        - FTH
        - OPPFTH
        - GR
        - GRS
        - SP
        - SAM
        - GY
        - GYS
        - KOMVUX
        - SARVUX
        - SFI
        - KU
        - YH
        - FHS
        - STF
        - KKU
        - HS
        - ABU
        - AU
    CreateSubscription:
      type: object
      title: Subscription
      description: >
        Skapas en prenumeration på ändringar av angivna objekt. Vid ändringar i
        informationsmängden hos informationsägaren ska det konsumerande systemet
        notifieras via den URL som anges i `target`. Det konsumerande systemet
        gör därefter anrop för att inhämta ändrad eller borttagen information.
        Informationsägaren ska skicka en notis för varje registrerad
        prenumeration så fort en förändring identifieras. Informationsägaren kan
        välja att skicka en notis för multipla förändringar.
      properties:
        name:
          description: "Ett beskrivande namn på webhook:en."
          type: string
        target:
          description: |
            URL:en som webhook:en ska posta till.
          type: string
        resourceTypes:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: "#/components/schemas/Code_ObjectType"
      required:
        - name
        - target
        - resourceTypes
