          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: endTime.onOrBefore
          description: >
            Hämta kalenderhändelser till och med denna tidpunkt (RFC 3339
            format, t.ex. "2016-10-15T11:00:00+02:00").
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime.onOrAfter
          description: >
            Hämta kalenderhändelser från och med denna tidpunkt (RFC 3339
            format, t.ex. "2016-10-15T11:00:00+02:00").
