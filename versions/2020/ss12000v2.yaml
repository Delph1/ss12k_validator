externalDocs:
  description: För mer information hämtas från SIS - TK450
  url: "https://sis.se/standardutveckling/tksidor/tk400499/sistk450/"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Absence:
      title: Absence
      type: object
      description: >
        Absence ska användas för att beskriva anmäld frånvaro för en elev. Den
        anmälda frånvaron kan avse en av skolan beviljad ledighet eller en
        frånvaro av annan art som anmäls av eleven själv eller elevens
        vårdnadshavare.
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för den anmälda frånvaron.
          readOnly: true
        meta:
          $ref: "#/components/schemas/Meta"
          readOnly: true
        startTime:
          type: string
          format: date-time
          description: >
            Starttid för den anmälda frånvaron (RFC 3339 format, tex
            "2015-12-12T10:30:00+01:00").
        endTime:
          type: string
          format: date-time
          description: >
            Sluttid för den anmälda frånvaron (RFC 3339, format tex
            "2015-12-12T10:30:00+01:00").
        type:
          $ref: "#/components/schemas/Code_AbsenceType"
        student:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Referens till eleven.
        organisation:
          allOf:
            - $ref: "#/components/schemas/SchoolUnitReference"
            - description: Den skolenhet som den anmälda frånvaron avser.
        registeredBy:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: |
                Referens till den person som registrerat den anmälda frånvaron.
      required:
        - id
        - meta
        - startTime
        - endTime
        - type
        - student
    Activity:
      title: Activity
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för aktiviteten.
        meta:
          $ref: "#/components/schemas/Meta"
        displayName:
          type: string
          description: "Namn på aktiviteten, i presentationssyfte."
        calendarEventsRequired:
          type: boolean
          description: >
            Detta ska uttrycka huruvida aktiviteten ska vara underlag för
            generering av lektion eller inte.
        startDate:
          type: string
          format: date
          description: >
            Datum för när aktiviteten startar (RFC 3339-format, t.ex.
            "2016-10-15").
        endDate:
          type: string
          format: date
          description: >
            Datum för när aktiviteten slutar (RFC 3339-format, t.ex.
            "2016-10-15").
        activityType:
          type: string
          title: Code_ActivityType
          enum:
            - Undervisning
            - Elevaktivitet
            - Provaktivitet
            - Läraraktivitet
            - Övrigt
          description: >
            Beskriver vilken typ av aktivitet som avses.

            * _Undervisning_ - Schemalagd tid med koppling till timplan, som ska
            närvarorapporteras.

            * _Elevaktivitet_ - Schemalagd tid för elever som inte är
            undervisning enligt timplan, och som ska närvarorapporteras,
            exempelvis mentorstid, klassråd eller friluftsdag

            * _Provaktivitet_ - En aktivitet som är avsedd för att definiera ett
            eller flera provtillfällen

            * _Läraraktivitet_ - Tid för lärare som inte är undervisning och som
            ingår i lärarens arbetstid, kan vara schemalagd, men ska inte
            närvarorapporteras, exempelvis konferenstid.

            * _Övrigt_ - Läxhjälp, lunch, bokning och annat som finns på
            schemat, men inte är undervisning och inte ska närvarorapporteras
        comment:
          type: string
          description: En text med kompletterande information.
        minutesPlanned:
          type: integer
          description: Den totalt planerade tiden i minuter.
        groups:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GroupReference"
          description: De grupper som är kopplade till aktiviteten.
        teachers:
          type: array
          items:
            type: object
            title: DutyAssignment
            properties:
              duty:
                $ref: "#/components/schemas/DutyReference"
                required: true
              startDate:
                type: string
                format: date
                description: >
                  Datum för när lärarens deltagande i aktiviteten startar (RFC
                  3339-format, t.ex. "2016-10-15").
              endDate:
                type: string
                format: date
                description: >
                  Datum för när lärarens deltagande i aktiviteten slutar (RFC
                  3339-format, t.ex. "2016-10-15").
              minutesPlanned:
                type: integer
                description: Det antal minuter läraren är kopplad till aktiviteten
              grader:
                type: boolean
                description: >-
                  Markerar att läraren har rollen som betygsättande lärare för
                  aktiviteten
          description: De lärare (Duty-objekt) som är kopplade till aktiviteten.
        syllabus:
          allOf:
            - $ref: "#/components/schemas/SyllabusReference"
            - description: Det kurs- eller ämnesplan som aktiviteten är knuten till.
        organisation:
          allOf:
            - $ref: "#/components/schemas/OrganisationReference"
            - description: Den skolenhet/skola som aktiviteten är knuten till.
        parentActivity:
          allOf:
            - $ref: "#/components/schemas/ActivityReference"
            - description: >
                Möjlighet att koppla aktiviteten till en eller flera
                ursprungliga “föräldraaktiviteter”.
      required:
        - id
        - displayName
        - organisation
        - calendarEventsRequired
        - startDate
        - groups
    ActivityExpanded:
      allOf:
        - $ref: "#/components/schemas/Activity"
        - type: object
          properties:
            _embedded:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    $ref: "#/components/schemas/Group"
                syllabus:
                  $ref: "#/components/schemas/Syllabus"
                teachers:
                  type: array
                  items:
                    $ref: "#/components/schemas/Duty"
    ActivityReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: ActivityReference
          description: Referens till en aktivitet
    AggregatedAttendance:
      type: object
      title: AggregatedAttendance
      properties:
        activity:
          $ref: "#/components/schemas/ActivityReference"
        student:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Referens till eleven
        startDate:
          type: string
          format: date
          description: >
            Startdatum för den aggregerade närvaron (RFC 3339-format, t.ex.
            "2016-10-15"). Inkluderande.
        endDate:
          type: string
          format: date
          description: >
            Slutdatum för den aggregerade närvaron (RFC 3339-format, t.ex.
            "2016-10-15"). Inkluderande.
        attendanceSum:
          type: integer
          description: |
            Summerad tid i minuter för elevens närvaro på kalenderhändelser.
        validAbsenceSum:
          type: integer
          description: >
            Summerad tid i minuter för elevens giltiga frånvaro på
            kalenderhändelser.
        invalidAbsenceSum:
          type: integer
          description: >
            Summerad tid i minuter för elevens ogiltiga frånvaro på
            kalenderhändelser.
        otherAttendanceSum:
          type: integer
          description: >
            Summerad tid i minuter för elevens deltagande i annan skolaktivitet,
            såsom elevråd, i stället för deltagande på kalenderhändelser.
        reportedSum:
          type: integer
          description: >
            Summerad tid i minuter för alla elevens kalenderhändelser där
            läraren eller annan personal har markerat lektionen som
            färdigrapporterad.
        offeredSum:
          type: integer
          description: >
            Summerad tid i minuter för alla kalenderhändelser där eleven har
            erbjudits möjlighet att närvara.
        _embedded:
          type: object
          properties:
            activity:
              $ref: "#/components/schemas/Activity"
            student:
              $ref: "#/components/schemas/Person"
      required:
        - startDate
        - endDate
        - activity
        - student
        - attendanceSum
    Attendance:
      type: object
      title: Attendance
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för närvaroposten.
          readOnly: true
        meta:
          $ref: "#/components/schemas/Meta"
          readOnly: true
        calendarEvent:
          $ref: "#/components/schemas/CalendarEventReference"
        student:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Referens till eleven.
        reporter:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Person som rapporterat kalenderhändelsen.
        isReported:
          type: boolean
          description: Anger om lektionen är rapporterad.
        attendanceMinutes:
          type: integer
          description: Längd i minuter för elevens närvaro på kalenderhändelsen.
        validAbsenceMinutes:
          type: integer
          description: |
            Längd i minuter för elevens giltiga frånvaro på kalenderhändelsen.
        invalidAbsenceMinutes:
          type: integer
          description: |
            Längd i minuter för elevens ogiltiga frånvaro på kalenderhändelsen.
        otherAttendanceMinutes:
          type: integer
          description: >
            Tid i  minuter för elevens deltagande i annan skolaktivitet, såsom
            elevråd, i stället för deltagande på kalenderhändelsen.
        absenceReason:
          type: string
          description: Angiven anledning till frånvaro.
        reportedTimestamp:
          type: string
          format: date-time
          description: >
            Tidpunkt för rapportering av kalenderhändelsen (RFC 3339 format, tex
            "2015-12-12T10:30:00+01:00").
      required:
        - id
        - meta
        - student
        - calendarEvent
        - isReported
        - attendanceMinutes
    AttendanceEvent:
      type: object
      title: AttendanceEvent
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för den anmälda frånvaron.
          readOnly: true
        meta:
          $ref: "#/components/schemas/Meta"
          readOnly: true
        time:
          type: string
          format: date-time
        eventType:
          type: string
          title: Code_AttendanceEventType
          enum:
            - In
            - Ut
        person:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Referens till barnet eller eleven
        registeredBy:
          allOf:
            - $ref: "#/components/schemas/PersonReference"
            - description: Anger den person som registrat in- respektive utcheckning.
        group:
          allOf:
            - $ref: "#/components/schemas/GroupReference"
            - description: Den avdelning eller grupp på förskoleenheten som närvaron.
        _embedded:
          type: object
          readOnly: true
          properties:
            registeredBy:
              $ref: "#/components/schemas/Person"
            person:
              $ref: "#/components/schemas/Person"
            group:
              $ref: "#/components/schemas/GroupFragment"
      required:
        - id
        - meta
        - time
        - eventType
        - child
        - group
    AttendanceSchedule:
      type: object
      title: AttendanceSchedule
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för vistelseschemat.
          readOnly: true
        meta:
          $ref: "#/components/schemas/Meta"
          readOnly: true
        placement:
          allOf:
            - $ref: "#/components/schemas/PlacementReference"
            - description: Referens till en placeringen schemat avser.
        numberOfWeeks:
          type: integer
          description: Hur många veckor schemat gäller för innan det "börjar om".
        startDate:
          type: string
          format: date
          description: >
            Anger datum då schemat startar (RFC 3339-format, t.ex.
            "2016-10-15"). Inkluderande.
        endDate:
          type: string
          format: date
          description: >
            Anger datum då schemat slutar (RFC 3339-format, t.ex. "2016-10-15").
            Inkluderande.
        temporary:
          type: boolean
          description: >
            Anger om detta är ett undantag som gäller i stället för
            normalschemat under en begränsad tid. Slutdatum måste anges.
          default: false
        state:
          type: array
          items:
            type: object
            title: AttendanceScheduleState
            properties:
              state:
                type: string
                title: Code_AttendanceScheduleState
                enum:
                  - Godkänt
                  - Begärt
                  - Nekat
                description: Beskriver schemats tillstånd.
              registeredAt:
                type: string
                format: date-time
                description: >
                  Tid och datum för tillstånd (RFC 3339 format, tex
                  "2015-12-12T10:30:00+01:00").
              comment:
                type: string
                description: En kommentar angående tillståndet.
              registeredBy:
                allOf:
                  - $ref: "#/components/schemas/PersonReference"
                  - description: Referens till den person som registrerat tillståndet.
            required:
              - state
              - registeredAt
        scheduleEntries:
          type: array
          items:
            type: object
            title: AttendanceScheduleEntry
            properties:
              weekOffset:
                type: integer
                description: >
                  Anger vecka för alternerande schema, exempelvis 0, 1, eller 2
                  beroende på hur många olika veckor som är specificerade i
                  schemat.
              dayOfWeek:
                type: string
                enum:
                  - Måndag
                  - Tisdag
                  - Onsdag
                  - Torsdag
                  - Fredag
                  - Lördag
                  - Söndag
                description: |
                  Anger veckodag.
              startTime:
                type: string
                format: "^[0-9]{2}:[0-9]{2}$"
                description: 'Starttid på dagen för schemat (IS08601 format, t.ex. "08:30").'
              length:
                type: integer
                description: Längden på den tid efter starttid som barnet ska vara
      required:
        - id
        - meta
        - startDate
        - scheduleDays
        - placement
        - state
    CalendarEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identifierare för kalenderhändelsen.
        meta:
          $ref: "#/components/schemas/Meta"
        activity:
          allOf:
            - $ref: "#/components/schemas/ActivityReference"
            - description: Den aktivitet kalenderhändelsen är kopplad till
        startTime:
          type: string
          format: date-time
          description: >
            Kalenderhändelsens starttid med datum och tid (RFC 3339 format tex
            "2015-12-12T10:30:00+01:00").
        endTime:
          type: string
          format: date-time
          description: >
            Kalenderhändelsens sluttid med datum och tid (RFC 3339 format tex
            "2015-12-12T10:30:00+01:00").
        cancelled:
          type: boolean
          description: >
            Inställd används för att ange att en planerad kalenderhändelse inte
            ska äga rum till följd av en avbokning eller annan tillfällig
            avvikelse. Förvalt värde är False.
        teachingLengthTeacher:
          type: integer
          description: >
            Faktisk undervisningstid för lärare anges i minuter. Lärartiden kan
            vara kortare eller längre än tiden för kalenderhändelsen.
        teachingLengthStudent:
          type: integer
          description: >
            Faktisk undervisningstid för elever (och elever ingående i grupper).
            Anges i minuter. Tiden kan vara kortare eller längre än tiden för
            kalenderhändelsen, till exempel då en rast ingår i tiden.
        comment:
          type: string
          description: En text med kompletterande information.
        studentExceptions:
          type: array
          items:
            type: object
            title: StudentException
            description: >
              Anger avvikelser beträffande elevs deltagande, tid och längd för
              ett enstaka kalendertillfälle.
            properties:
              student:
                $ref: "#/components/schemas/PersonReference"
              participates:
                type: boolean
                description: >
                  Används för att ange om en elev deltar på ett visst
                  kalendertillfälle.
              startTime:
                type: string
                format: date-time
                description: >
                  Starttid för undantaget (RFC 3339 format tex
                  "2015-12-12T10:30:00+01:00").
              endTime:
                type: string
                format: date-time
                description: >
                  Sluttid för undantaget (RFC 3339 format tex
                  "2015-12-12T11:00:00+01:00").
              teachingLength:
                type: integer
                description: >
                  Undervisningstid i minuter för eleven. Om den ej anges så
                  gäller det som är angivet i, i första hand, CalendarEvent, och
                  annars i Activity.
            required:
              - student
              - participates
        teacherExceptions:
          type: array
          items:
            type: object
            title: TeacherException
            description: >
              Anger avvikelser beträffande lärares ansvar, tid och längd för ett
              enstaka kalendertillfälle.
            properties:
              duty:
                $ref: "#/components/schemas/DutyReference"
              participates:
                type: boolean
                description: >
                  Används för att ange om en lärare ska delta på ett visst
                  kalendertillfälle.
              startTime:
                type: string
                format: date-time
                description: >
                  Starttid för undantaget (RFC 3339 format tex
                  "2015-12-12T10:30:00+01:00").
              endTime:
                type: string
                format: date-time
                description: >
                  Sluttid för undantaget (RFC 3339 format tex
                  "2015-12-12T10:30:00+01:00").
              teachingLength:
                type: integer
                description: >
                  Undervisningstid i minuter för läraren. Om den ej anges så
                  gäller det som är angivet i, i första hand, CalendarEvent, och
                  annars i Activity.
            required:
              - duty
              - participates
        rooms:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/ObjectReference"
              - title: RoomReference
                description: Den lokal eller plats som är bokad för kalenderhändelsen.
                required:
                  - id
        resources:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/ObjectReference"
              - title: ResourceReference
                description: En bokningsbar resurs som inte är en lokal.
                required:
                  - id
        _embedded:
          type: object
          properties:
            activity:
              $ref: "#/components/schemas/Activity"
            attendance:
              type: array
              items:
                $ref: "#/components/schemas/Attendance"
      required:
        - id
        - startTime
        - endTime
        - meta
        - activity
    CalendarEventReference:
      allOf:
        - $ref: "#/components/schemas/ObjectReference"
        - title: CalendarEventReference
          description: Referens till en kalenderhändelse
    Code_AbsenceType:
      type: string
