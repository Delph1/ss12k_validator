        expectedSchema: Organisation
        extractData:
          organisation_id: "data[0].id"
      # Step 2: Fetch persons, using the extracted organisation_id from step 1
      - name: "Fetch persons by organisation"
        method: GET
        endpoint: "/persons?relationship.organisation={organisation_id}"
        expectedSchema: Person
      # Step 3: Fetch duties 
      - name: "Fetch duties"
        method: GET
        endpoint: "/duties?organisation={organisation_id}"
        expectedSchema: Duty
      # Step 4: Fetch groups
      - name: "Fetch groups"
        method: GET
        endpoint: "/groups?owner={organisation_id}"
        expectedSchema: Group
      # Step 4: Post Subscriptions
      - name: "Post Subscriptions"
        method: POST
        endpoint: "/subscriptions"
        expectedSchema: Subscription

