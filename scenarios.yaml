# SS12000 API Validation Scenarios
# 
# This file defines the test scenarios that will be executed against your API.
# 
# Scenario Structure:
# - Each scenario has an id, name, description, and ordered list of steps
# - Each step makes an HTTP request, validates the response, and can extract data for later steps
# - Extracted data can be substituted into subsequent endpoint URLs using {variable_name} placeholders
#
# Example scenario structure:

scenarios:
  # Scenario ID (used internally and in URLs)
  c1:
    name: "C.1 Grundläggande personinformation"
    description: "Den grundläggande information innehåller uppgifter såsom namn, personnummer och kontaktuppifter. Organisationen kan vara en huvudman, en skola, en skolenhet eller annan nivå av organisation."
    
    steps:
      # Step 1: Fetch organisations
      - name: "Fetch organisations"
        method: GET
        endpoint: /organisations
        expectedSchema: Organisation
        extractData:
          organisation_id: "data[0].id"
      
      # Step 2: Fetch persons, using the extracted organisation_id from step 1
      - name: "Fetch persons by organisation"
        method: GET
        endpoint: "/persons?relationship.organisation={organisation_id}"
        expectedSchema: Person
        extractData:
          first_person_id: "data[0].id"

  c2:
    name: "C.2 Underlag för personers roller och behörighet"
    description: "Scenariot handlar om att tilldela behörighet för persongrupper i det mottagande systemet."

    steps:
      # Step 1: Fetch organisations
